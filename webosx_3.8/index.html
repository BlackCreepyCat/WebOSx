<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebOSx</title>
    <link rel="stylesheet" href="css/core.css">
</head>
<body>

    <div id="ps3-waves">
        <canvas id="ps3-waves-canvas"></canvas>
    </div>

    <div id="boot-screen">
        <div class="boot-logo-wrap">
            <svg class="boot-hex" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bootHexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:hsl(var(--hue), 80%, 58%)"/>
                        <stop offset="100%" style="stop-color:hsl(calc(var(--hue) + 25), 75%, 48%)"/>
                    </linearGradient>
                </defs>
                <polygon class="boot-hex-fill" points="50,4 90,27 90,73 50,96 10,73 10,27" fill="url(#bootHexGrad)"/>
                <polygon class="boot-hex-outline" points="50,4 90,27 90,73 50,96 10,73 10,27" fill="none" stroke="url(#bootHexGrad)" stroke-width="2.5"/>
            </svg>
        </div>
        <div class="boot-logo">WebOSx</div>
        <div class="boot-loading">loading...</div>
        <div class="boot-spinner"></div>
        <div class="boot-footer">WebOSx (C)2026 By Creepy Cat</div>
    </div>

    <div id="desktop"></div>
    <div id="start-menu">
        <div class="start-menu-header">
            <div class="start-menu-brand">
                <div class="start-menu-brand-mark">⬡</div>
                <div class="start-menu-brand-text">
                    <span class="start-menu-brand-title">WebOSx</span>
                    <span class="start-menu-brand-sub" data-i18n="chrome.start.brandSub">Toutes les applications</span>
                </div>
            </div>
            <div class="start-menu-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="start-search" data-i18n-placeholder="chrome.start.searchPlaceholder" placeholder="Rechercher une application..." autocomplete="off">
            </div>
        </div>
        <div id="start-menu-list" class="start-menu-list"></div>
        <div id="start-menu-empty" class="start-menu-empty" data-i18n="chrome.start.empty">Aucun résultat</div>
        <div class="start-menu-footer">
            <button class="start-footer-btn" id="start-about-btn" data-i18n-title="chrome.start.about" title="À propos de WebOSx">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16.2"/><circle cx="12" cy="7.6" r="1" fill="currentColor" stroke="none"/></svg>
                <span data-i18n="chrome.start.about">À propos</span>
            </button>
            <button class="start-footer-btn" id="start-settings-btn" data-i18n-title="chrome.start.settings" title="Configuration">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><circle cx="12" cy="12" r="7.4"/><line x1="12" y1="2.3" x2="12" y2="4.7"/><line x1="12" y1="19.3" x2="12" y2="21.7"/><line x1="2.3" y1="12" x2="4.7" y2="12"/><line x1="19.3" y1="12" x2="21.7" y2="12"/><line x1="5" y1="5" x2="6.7" y2="6.7"/><line x1="17.3" y1="17.3" x2="19" y2="19"/><line x1="5" y1="19" x2="6.7" y2="17.3"/><line x1="17.3" y1="6.7" x2="19" y2="5"/></svg>
                <span data-i18n="chrome.start.settings">Configuration</span>
            </button>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn">⬡</button>
        <div id="taskbar-apps"></div>
        <div id="fullscreen-switcher">
            <button id="fullscreen-btn" data-i18n-title="chrome.fullscreen.switch" title="Plein écran">
                <span id="fullscreen-icon"></span>
            </button>
            <div id="fullscreen-menu"></div>
        </div>
        <div id="lang-switcher">
            <button id="lang-btn" data-i18n-title="chrome.lang.switch" title="Changer de langue">
                <span id="lang-flag">🇫🇷</span><span id="lang-code">FR</span>
            </button>
            <div id="lang-menu"></div>
        </div>
        <div id="taskbar-clock">
            <span id="clock-time">00:00</span>
            <span id="clock-date">01/01/1970</span>
        </div>
    </div>

    <!-- ===== NOYAU (ne pas réordonner) ===== -->
    <!-- Cache-busting : ?v=3.8 sur chaque <script>. Penser à incrémenter ce
         numéro (idéalement le même que about.version) à chaque déploiement,
         sinon les navigateurs peuvent servir une version en cache. -->
    <script src="js/core/icons.js?v=3.8"></script>
    <script src="js/core/settings.js?v=3.8"></script>
    <script src="js/core/i18n.js?v=3.8"></script>
    <script src="js/core/lang/fr.js?v=3.8"></script>
    <script src="js/core/lang/en.js?v=3.8"></script>
    <script src="js/core/lang/es.js?v=3.8"></script>
    <script src="js/core/lang/de.js?v=3.8"></script>
    <script src="js/core/wave-background.js?v=3.8"></script>
    <script src="js/core/window-manager.js?v=3.8"></script>
    <script src="js/core/app-registry.js?v=3.8"></script>
    <script src="js/core/settings-registry.js?v=3.8"></script>
    <script src="js/core/vfs.js?v=3.8"></script>
    <script src="js/core/ui-kit.js?v=3.8"></script>
    <script src="js/core/os.js?v=3.8"></script>

    <!-- ===== GREFFONS ===== -->
    <!-- Ajoute tes nouveaux greffons ici, sous forme d'une ligne <script> -->
    <script src="js/apps/about.js?v=3.8"></script>
    <script src="js/apps/settings-app.js?v=3.8"></script>
    <script src="js/apps/files.js?v=3.8"></script>
    <script src="js/apps/imageviewer.js?v=3.8"></script>
    <script src="js/apps/unitconverter.js?v=3.8"></script>
    <script src="js/apps/stickynote.js?v=3.8"></script>
    <script src="js/apps/timer.js?v=3.8"></script>
    <script src="js/apps/todo.js?v=3.8"></script>
    <script src="js/apps/notepad.js?v=3.8"></script>
    <script src="js/apps/terminal.js?v=3.8"></script>
    <script src="js/apps/calculator.js?v=3.8"></script>
    <script src="js/apps/clock.js?v=3.8"></script>
    <script src="js/apps/weather.js?v=3.8"></script>
    <script src="js/apps/password.js?v=3.8"></script>
    <script src="js/apps/xeyes.js?v=3.8"></script>
    <script src="js/apps/mp3.js?v=3.8"></script>
    <script src="js/apps/video.js?v=3.8"></script>
    <script src="js/apps/p2p.js?v=3.8"></script>
    <script src="js/apps/chat.js?v=3.8"></script>
	<script src="js/apps/minesweeper.js?v=3.8"></script>
	<script src="js/apps/crypto.js?v=3.8"></script>

    <!-- ===== DÉMARRAGE (toujours en dernier) ===== -->
    <script src="js/main.js?v=3.8"></script>
</body>
</html>
